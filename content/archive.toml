[[items]]
slug = "agent-xpu"
title = "Agent.xpu: Efficient Scheduling of Agentic LLM Workloads on Heterogeneous SoC"
authors = "Xinming Wei, Jiahao Zhang, Haoran Li 等（北京大学）"
venue = "arXiv 2025"
date = "2025-06"
tags = ["NPU", "AI Acceleration", "LLM Serving", "SoC", "调度", "系统优化"]
summary = "面向手机 / 笔电这类 SoC 设备上的 LLM Agent 推理。reactive 任务（用户主动发起，要求低延迟）和 proactive 任务（后台运行，要求高吞吐）必须共享同一块 SoC 上的 CPU / NPU / iGPU 三种计算单元。论文用 HEG + Stage Elasticity + 细粒度抢占 + 余量搭载这一整套机制，把操作系统级的进程调度思想搬到片上 LLM 推理：reactive 类比实时进程，proactive 类比后台进程，NPU 和 iGPU 类比两种特性不同的处理器核。"
link = "https://arxiv.org/abs/2506.24045"

[[items]]
slug = "kvflow"
title = "KVFlow: Efficient Prefix Caching for Accelerating LLM-Based Multi-Agent Workflows"
authors = "Zaifeng Pan, Ajjkumar Patel, Zhengding Hu 等"
venue = "NeurIPS 2025"
date = "2025-07"
tags = ["KV Cache", "LLM Serving", "多智能体", "系统优化", "调度"]
summary = "面向多智能体 workflow 的 KV cache 管理框架。作者指出，LRU 在 agentic 场景下会把「马上要被复用」的前缀缓存早早淘汰，于是提出用 Agent Step Graph 估计每个 agent 距离下一次激活还差几步，再据此做细粒度的节点级淘汰，并叠加 CPU→GPU 的全异步预取，最终在 SGLang hierarchical radix cache 上拿到 1.83×–2.19× 的端到端加速。"
link = "https://arxiv.org/abs/2507.07400"
